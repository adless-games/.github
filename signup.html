<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADless games</title>
  <script type="text/javascript" src="https://sdk.userbase.com/2/userbase.js"></script>
</head>

<body>
      <!-- Auth View -->
  <div id="auth-view" align=center>
    <h1>Sign up</h1>
    <form id="signup-form">
      <input id="signup-username" style='text-align: center' type="text" required placeholder="Username"><br><br>
      <input id="signup-password" style='text-align: center' type="password" required placeholder="Password"><br><br>
      <button onclick="window.history.back()" style='background:white; border-radius: 7px; outline: none; border: 1px solid  black; cursor: pointer;' >←</button> &nbsp; <input style='background:white; border-radius: 7px; outline: none; border: 1px solid  black; cursor: pointer' type="submit" value="Create an account">
    </form>
    <br>
    <div style='color: red' id="signup-error"></div>
  </div>

  <!-- application code -->
  <script>
    userbase.init({ appId: 'f26fb1ef-2323-4c02-9c0c-72cbd7bc6519' })
    function handleSignUp(e) {
    e.preventDefault()

    const username = document.getElementById('signup-username').value
    const password = document.getElementById('signup-password').value

    userbase.signUp({ username, password, rememberMe: 'none' })
      .then((user) => {document.location.href = 'login.html'; localStorage.username = username; localStorage.password = password})
      .catch((e) => document.getElementById('signup-error').innerHTML = e)
  }

  document.getElementById('signup-form').addEventListener('submit', handleSignUp)
  
  </script>
</body>
</html>
