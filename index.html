<script>
    el = (id) => document.getElementById(id);
    page = () => document.documentElement
    el('header').style.position = 'absolute';
    page().style.overflowX = 'hidden';
    page().style.userSelect = 'none';
    setInterval(() => {

        //more button and create button
        el('more').style.left = (window.innerWidth - el('more').offsetWidth) * .75 + 'px';
        el('more').style.top = (el('header').offsetTop + el('header').offsetHeight - el('more').offsetHeight) *.75 + 'px';
        el('content').style.top = el('header').offsetTop + el('header').offsetHeight + 'px';
        // update top buttons postion 
        el('buttons').style.left = (window.innerWidth - el('buttons').offsetWidth - 25) + 'px';

        if (el('buttons').offsetTop < window.scrollY + 5) {
            el('buttons').style.top = (el('buttons').offsetTop + 5) + 'px';
        } else if (el('buttons').offsetTop > window.scrollY + 9) {
            el('buttons').style.top = (el('buttons').offsetTop - 20) + 'px';
        }

        // Header animation
        if (window.scrollY > 1) {
            if (el('header').offsetTop > -1 * el('header').offsetHeight) {
                el('header').style.top = (el('header').offsetTop - 10) + 'px';
            }
            //initial scroll down
            //if(el('header').offsetTop -10 <  -1*el('header').offsetHeight && el('header').offsetTop >  -1*el('header').offsetHeight){}
        } else {
            if (el('header').offsetTop < 0) {
                el('header').style.top = (el('header').offsetTop + 20) + 'px';
            }
        }

    })
    for(i=1;i<el('content').childNodes.length;i++){
            if(el('content').childNodes[i].src == ""){
               el('content').childNodes[i].src = 'fallback2.jpg'
            }
    }

    //MESSAGE FOR SCHOOLS

    if( !!localStorage.msg){
        if(!localStorage.msg.includes('school')){
            localStorage.msg.append('school')
            document.location.href = 'school'
            alert()
        }
    }else{
        localStorage.msg = ['school'];
        document.location.href = 'school'
    }
</script>
